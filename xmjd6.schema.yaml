# Rime schema settings
# encoding: utf-8
# 方案维护者：Proud丶Cat、热热佬、千年蟲
# 方案溯源：星空键道6.2 →  🐈星猫键道6.3

schema:
  schema_id: xmjd6
  name: 星🐈键道
  version: "20251119"
  author:
    - 方案维护者：Proud丶Cat、热热佬、千年蟲
  description: |
    方案溯源：星空键道6.2 →  🐈星猫键道6.3
    本方案特色：
    增加百万词语，优化打字体验。
    o键超级繁体(全字集)，让繁体字特殊字不再属于形码专利。
    v键开启二分反查功能。
  dependencies:
    - xmjd6.cx
    - pinyin_simp
    - liangfen
    - xmjd6.gbk

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: ascii_punct
    reset: 0
    states: [ 全角, 半角 ]
  - name: jffh
    reset: 0
    states: [ 简体, 繁體 ]
  - name: mars
    reset: 0
    states: [ 地球文, 火星文 ]
  - name: emoji_cn
    reset: 1
    states: [ 简约, 表情展示 ]
  - name: embeded_cands
    reset: 0
    states: [普通, 嵌入候选]
  - name: sbb_hint
    reset: 1
    states: [ 简约, 630提示 ]
  - name: completion
    reset: 1
    states: [ 简约, 逐码展示 ]

engine:
  processors:
    - lua_processor@*xmjd6/xmjd6_select_character
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@*xmjd6/xmjd6_smart_2
    - lua_processor@*xmjd6/xmjd6_topup_processor
    - lua_processor@*xmjd6/add_ge
    - lua_processor@*xmjd6/bianzi
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@pinyin_simp
    - affix_segmentor@quanpinerfen
    - affix_segmentor@xmjdWXYZ
    - affix_segmentor@xmjd6gbk
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*xmjd6/xmjd6_jisuanqi
    - lua_translator@*xmjd6/xmjd6_shijian
    - lua_translator@*xmjd6/xmjd6_zimu_translator
    - lua_translator@*xmjd6/xmjd6_shuzi
    - lua_translator@*xmjd6/unicode
    - history_translator@repeat_history
    - history_translator@repeat_history2
    - punct_translator
    - table_translator
    - reverse_lookup_translator
    - table_translator@xmjdWXYZ
    - table_translator@xmjdYY
    - table_translator@xmjdZZ
    - table_translator@xmjdWW
    - table_translator@xmjd6_user
    - script_translator@quanpinerfen
    - script_translator@pinyin_simp
    - script_translator@xmjd6gbk
    - lua_translator@*xmjd6/force_gc
  filters:
    - simplifier
    - reverse_lookup_filter@pinyin_simp_lookup
    - reverse_lookup_filter@quanpinerfen_lookup
    - reverse_lookup_filter@gbk_lookup
    - lua_filter@*xmjd6/xmjd6_completion
    - lua_filter@*xmjd6/xmjd6_single_char
    - simplifier@emoji_cn
    - simplifier@jffh
    - simplifier@ascii_punct
    - simplifier@mars
    - lua_filter@*xmjd6/xmjd6_embeded_cands@embeded_cands
    - lua_filter@*xmjd6/add_space
    - lua_filter@*xmjd6/xmjd6_filter
    - uniquifier

speller:
  auto_select: false
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"
  algebra:
    - derive/[0-9]$//
    - derive|^;|/|

translator:
  dictionary: xmjd6.extended
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: true
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: true
  max_phrase_length: 6
  initial_quality: 0
  comment_format:
    - xform/[0-9]//

# 布局配置
layout:
  topup:
    topup_this: "bcdefghjklmnpqrstwxyz"
    topup_with: "avuio;"
  algebra:
    - derive/^[bcdefghjklmnpqrstwxyz;]([bcdefghjklmnpqrstwxyz;][avuio].*)$/`$1/
    - derive/^([bcdefghjklmnpqrstwxyz;])[bcdefghjklmnpqrstwxyz;]([avuio].*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2})[avuio](.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{2}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{3}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{4}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{5}).$/$1`/
    - derive/^[bcdefghjklmnpqrstwxyz;]{2}([avuio`]*)$/``$1/
  patterns:
    special: "^(?:;?[avuio])[a-z]{0,}"

# 符号
punctuator:
  import_preset: xmjd6.symbols

# 历史回溯
repeat_history:
  input: i
  size: 3
  initial_quality: 10000
repeat_history2:
  input: ;f
  size: 3
  initial_quality: 10000

# Emoji 配置
emoji_cn:
  opencc_config: xmjd6/xmjd6_emoji.json
  option_name: emoji_cn
  comment_format:
    - xform/.*/ /

# 简繁火星文
jffh:
  opencc_config: xmjd6/xmjd6_s2tw.json
  option_name: jffh
mars:
  opencc_config: xmjd6/xmjd6_martian.json
  option_name: mars
ascii_punct:
  option_name: ascii_punct

# 反查定义
gbk_lookup:
  tags: [xmjd6gbk]
  dictionary: xmjd6.cx
  overwrite_comment: true
xmjd6gbk:
  tag: xmjd6gbk
  dictionary: xmjd6.gbk
  enable_sentence: true
  enable_completion: true
  enable_user_dict: false
  prefix: "o"

pinyin_simp_lookup:
  tags: [pinyin_simp]
  dictionary: xmjd6.cx
  overwrite_comment: true
pinyin_simp:
  tag: pinyin_simp
  dictionary: pinyin_simp
  enable_sentence: true
  enable_completion: true
  enable_user_dict: false
  preedit_format:
    - xform/^u(.+)/$1/
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  prefix: "u"
  tips: "〔全拼〕"

quanpinerfen_lookup:
  tags: [quanpinerfen]
  dictionary: xmjd6.cx
  overwrite_comment: true
quanpinerfen:
  tag: quanpinerfen
  dictionary: liangfen
  enable_sentence: true
  enable_completion: true
  enable_user_dict: false
  prefix: "v"
  tips: "〔二分〕"

reverse_lookup:
  dictionary: xmjd6.cx
  enable_completion: true
  comment_format:
    - xform/^/〔/
    - xform/$/〕/
    - xform/ /, /

# 扩展词库 translators
xmjdWXYZ:
  tag: xmjdWXYZ
  dictionary: xmjd6.extended
  user_dict: xmjd6_user
  db_class: tabledb
  enable_charset_filter: false
  enable_completion: true
  enable_encoder: true
  enable_sentence: true
  enable_user_dict: true
  encode_commit_history: false
  preedit_format:
    - xform|1|_|
  comment_format:
    - xform|1|_|
  prefix: "a"
  tips: "〔造词〕"

xmjdYY:
  __include: /xmjdWXYZ
  tag: xmjdYY
  dictionary: xmjd6.Y
  prefix: "~E"
  tips: "〔Y〕"
xmjdZZ:
  __include: /xmjdWXYZ
  tag: xmjdZZ
  dictionary: xmjd6.Z
  prefix: "~R"
  tips: "〔Z〕"
xmjdWW:
  __include: /xmjdWXYZ
  tag: xmjdWW
  dictionary: xmjd6.W
  prefix: "~T"
  tips: "〔W〕"

xmjd6_user:
  dictionary: ""
  user_dict: xmjd6_user
  db_class: stabledb
  enable_sentence: false
  enable_completion: true
  comment_format:
    - xform/[0-9]//
  initial_quality: -1

embeded_cands:
  option_name: embeded_cands
  index_indicators: [ ¹, ², ³, ⁴, ⁵, ⁶, ⁷, ⁸, ⁹, ⁰ ]
  first_format: "${Stash}[${候選}${Seq}]${Code}${Comment}"
  next_format: "${Stash}${候選}${Seq}${Comment}"
  separator: " "
  stash_placeholder: "~"

key_binder:
  select_first_character: "bracketleft"
  select_last_character: "bracketright"
  add_ge: "backslash"
  bian_zi: "slash"
  bindings:
    - { when: always, accept: "Control+period", toggle: ascii_punct }
    - {accept: minus, send: Page_Up, when: has_menu}
    - {accept: equal, send: Page_Down, when: has_menu}
    - { when: has_menu, accept: Tab, send: 2 }
    - {accept: semicolon, send: 2, when: has_menu}
    - {accept: apostrophe, send: 3, when: has_menu}
    - { when: always, accept: F6, select: .next }
    - { when: always, accept: F7, toggle: jffh }
    - { when: always, accept: "Control+backslash", toggle: emoji_cn }
    - { when: has_menu, accept: "&", toggle: emoji_cn }
    - { when: has_menu, accept: "%", toggle: mars }
    - { when: has_menu, accept: "*", toggle: jffh }
    - { when: has_menu, accept: "$", toggle: embeded_cands }
    - {accept: KP_0, send: 0, when: composing}
    - {accept: KP_1, send: 1, when: composing}
    - {accept: KP_2, send: 2, when: composing}
    - {accept: KP_3, send: 3, when: composing}
    - {accept: KP_4, send: 4, when: composing}
    - {accept: KP_5, send: 5, when: composing}
    - {accept: KP_6, send: 6, when: composing}
    - {accept: KP_7, send: 7, when: composing}
    - {accept: KP_8, send: 8, when: composing}
    - {accept: KP_9, send: 9, when: composing}
    - {accept: KP_Subtract, send: -, when: composing}
    - {accept: KP_Divide, send: /, when: composing}
    - {accept: KP_Multiply, send: "*", when: has_menu}
    - {accept: KP_Add, send: +, when: has_menu}
    - {accept: KP_Decimal, send: ".", when: has_menu}

recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
    reverse_lookup: "[a-z`]*`+[a-z`]*"
    punct: "^/([0-9]0?|[a-z]+)$"
    xmjdWXYZ: "^a['/a-z][a-z,./:?!']*'?$"
    pinyin_simp: "^u[a-z']*'?$"
    quanpinerfen: "^v[a-z']*'?$"
    xmjd6gbk: "^o[a-z]*?$"
    jsq: "^=[^;']+$"
    zhuan: "^\\\\.*$"
    unicode: "^&+.*$"

topup:
  __include: /layout/topup
  min_length: 4
  max_length: 6
  auto_clear: true
  min_length_danzi: 2
  topup_command: true
menu:
  page_size: 5
